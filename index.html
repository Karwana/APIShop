<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>APIShop - Online Store</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

    <!-- Top Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">APIShop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Produkter</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">Om oss</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Kontakta oss</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="bg-dark text-white text-center py-5">
        <div class="container">
            <h1>Välkommen till APIShop</h1>
            <p>Upptäck fantastiska produkter till bra priser</p>
        </div>
    </header>

    <!-- Loading Spinner – döljs av products.js när produkterna är laddade -->
    <div id="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Laddar...</span>
        </div>
        <p class="mt-2">Hämtar produkter...</p>
    </div>

    <!-- Products Grid – fylls i dynamiskt av products.js -->
    <section class="py-5">
        <div class="container">
            <div class="row g-4" id="products-container">
            </div>
        </div>
    </section>

    <!-- Order Modal – öppnas av openOrderModal() i order.js -->
    <div class="modal fade" id="orderModal" tabindex="-1" aria-labelledby="orderModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="orderModalLabel">Beställ produkt</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Stäng"></button>
                </div>
                <div class="modal-body">

                    <!-- Vald produkt – fylls i av openOrderModal() i order.js -->
                    <div class="d-flex align-items-center mb-4 p-3 bg-light rounded">
                        <img id="modal-product-img" src="" alt=""
                             style="width: 80px; height: 80px; object-fit: contain;" class="me-3">
                        <div>
                            <h6 id="modal-product-title" class="mb-1"></h6>
                            <span class="text-success fw-bold" id="modal-product-price"></span>
                        </div>
                    </div>

                    <!-- Beställningsformulär – valideras av validateForm() i order.js -->
                    <form id="order-form" novalidate>

                        <h6 class="mb-3">Dina uppgifter</h6>

                        <!-- Namn: min 2, max 50 tecken -->
                        <div class="mb-3">
                            <label for="field-name" class="form-label">Namn *</label>
                            <input type="text" class="form-control" id="field-name" placeholder="För- och efternamn">
                            <div class="invalid-feedback" id="error-name"></div>
                        </div>

                        <!-- E-post: måste innehålla @, max 50 tecken -->
                        <div class="mb-3">
                            <label for="field-email" class="form-label">E-postadress *</label>
                            <input type="text" class="form-control" id="field-email" placeholder="namn@exempel.se">
                            <div class="invalid-feedback" id="error-email"></div>
                        </div>

                        <!-- Telefon: siffror, bindestreck, parenteser, max 20 tecken -->
                        <div class="mb-3">
                            <label for="field-phone" class="form-label">Telefonnummer *</label>
                            <input type="text" class="form-control" id="field-phone" placeholder="070-123 45 67">
                            <div class="invalid-feedback" id="error-phone"></div>
                        </div>

                        <h6 class="mb-3 mt-4">Leveransadress</h6>

                        <!-- Gatuadress: min 2, max 50 tecken -->
                        <div class="mb-3">
                            <label for="field-street" class="form-label">Gatuadress *</label>
                            <input type="text" class="form-control" id="field-street" placeholder="Storgatan 1">
                            <div class="invalid-feedback" id="error-street"></div>
                        </div>

                        <div class="row">
                            <!-- Postnummer: exakt 5 siffror -->
                            <div class="col-md-4 mb-3">
                                <label for="field-zip" class="form-label">Postnummer *</label>
                                <input type="text" class="form-control" id="field-zip" placeholder="12345">
                                <div class="invalid-feedback" id="error-zip"></div>
                            </div>

                            <!-- Ort: min 2, max 20 tecken -->
                            <div class="col-md-8 mb-3">
                                <label for="field-city" class="form-label">Ort *</label>
                                <input type="text" class="form-control" id="field-city" placeholder="Stockholm">
                                <div class="invalid-feedback" id="error-city"></div>
                            </div>
                        </div>

                        <!-- Dolt fält – lagrar produkt-id för vald produkt -->
                        <input type="hidden" id="field-product-id">

                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Avbryt</button>
                    <!-- Knappen kopplas till submitOrder() i order.js via addEventListener -->
                    <button type="button" class="btn btn-primary" id="submit-order">Lägg beställning</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal – visas av submitOrder() i order.js efter lyckad beställning -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">
                <div class="modal-body">
                    <div class="text-success mb-3" style="font-size: 3rem;">✓</div>
                    <h4>Tack för din beställning!</h4>
                    <!-- Bekräftelsetexten sätts av submitOrder() i order.js -->
                    <p class="text-muted" id="success-message"></p>
                    <button type="button" class="btn btn-primary mt-2" data-bs-dismiss="modal">Stäng</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4">
        <div class="container">
            <p class="mb-0">&copy; 2026 APIShop. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- order.js laddas före products.js eftersom products.js anropar openOrderModal() som definieras i order.js -->
    <script src="js/order.js"></script>
    <script src="js/products.js"></script>

</body>
</html>
